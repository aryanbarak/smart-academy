name: Build & Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
      - uses: actions/checkout@v3

      - name: استفاده از Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: نصب وابستگی‌ها
        run: npm ci

      - name: بررسی تایپ‌اسکریپت
        run: npm run build

      - name: اجرای تست‌ها
        run: npm test -- --run

      - name: نمایش پیام موفقیت
        run: echo "✅ ساخت و تست‌ها با موفقیت انجام شد!"
