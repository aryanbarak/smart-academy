<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#3b82f6" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="FIAE Learn" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/smart-academy-180.png" />
    <link rel="icon" href="/smart-academy.svg" type="image/svg+xml" />
    <title>Smart Academy – GA2 & WISO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              mono: ['Fira Code', 'monospace'],
            },
            colors: {
              primary: {
                50: '#eff6ff',
                100: '#dbeafe',
                500: '#3b82f6',
                600: '#2563eb',
                700: '#1d4ed8',
                900: '#1e3a8a',
              }
            },
            keyframes: {
              fadeInUp: {
                '0%': { opacity: '0', transform: 'translateY(10px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              }
            },
            animation: {
              'fade-in-up': 'fadeInUp 0.3s ease-out forwards',
            }
          },
        },
      }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Vazirmatn:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
      /* Prevent white flash on WebView startup — matches Capacitor splash background */
      html, body { background-color: #0f172a; }
      body {
        font-family: 'Inter', sans-serif;
      }
      .font-farsi, [dir="rtl"], .rtl {
        font-family: 'Vazirmatn', 'Inter', sans-serif;
      }
      code, pre, .font-mono {
        font-family: 'JetBrains Mono', 'Fira Code', monospace;
        font-feature-settings: "liga" 1, "calt" 1;
      }

      /* Algorithm animation */
      .algo-bar {
        transition: height 0.3s ease, background-color 0.3s ease, transform 0.3s ease;
      }
      .algo-bar.comparing { background-color: #f59e0b !important; transform: scaleY(1.05); }
      .algo-bar.swapping  { background-color: #ef4444 !important; }
      .algo-bar.sorted    { background-color: #10b981 !important; }

      /* Pomodoro pulse */
      @keyframes pomoPulse {
        0%, 100% { opacity: 1; }
        50%       { opacity: 0.7; }
      }
      .pomo-active { animation: pomoPulse 2s infinite; }

      /* Mobile PDF viewer fixes */
      @media (max-width: 768px) {
        .pdf-viewer-container {
          position: fixed !important;
          top: 0 !important; left: 0 !important;
          right: 0 !important; bottom: 0 !important;
          z-index: 9999 !important;
        }
        canvas { max-width: 100% !important; height: auto !important; touch-action: pinch-zoom !important; }
        button[title*="Fullscreen"] { min-width: 44px !important; min-height: 44px !important; }
        .textLayer { opacity: 1 !important; mix-blend-mode: normal !important; }
      }

      .font-farsi {
        font-family: 'Vazirmatn', sans-serif;
      }

      .hero-bg {
        background-image: url('/hero-academy.png');
        background-size: cover;
        background-position: center;
      }

      .lesson-card-animate { animation: fadeInUp 0.3s ease forwards; }

      /* ── Safe Area (Capacitor / Notch) ── */
      :root {
        --sat: env(safe-area-inset-top, 0px);
        --sar: env(safe-area-inset-right, 0px);
        --sab: env(safe-area-inset-bottom, 0px);
        --sal: env(safe-area-inset-left, 0px);
      }
      /* Push header below status bar on Android */
      .safe-top    { padding-top:    var(--sat); }
      .safe-bottom { padding-bottom: var(--sab); }

      /* Reserve space for the mobile bottom nav */
      .has-bottom-nav { padding-bottom: calc(64px + var(--sab)); }

      /* Minimum touch target size */
      .touch-target {
        min-height: 44px;
        min-width: 44px;
      }
      
      /* PDF / Print Optimization */
      @media print {
        @page {
          margin: 2cm;
        }
        body {
          background-color: white !important;
          color: black !important;
        }
        nav, button, .no-print {
          display: none !important;
        }
        #root {
          padding: 0 !important;
          margin: 0 !important;
        }
        .lesson-card-header {
          border: none !important;
          padding: 0 !important;
          margin-bottom: 20px !important;
        }
        .lesson-content {
          display: block !important;
          border: none !important;
          padding: 0 !important;
        }
        pre {
          border: 1px solid #ccc !important;
          background: #f5f5f5 !important;
          color: black !important;
          white-space: pre-wrap !important;
        }
        /* Force background colors for print if user enables it */
        .print:bg-gray-100 { -webkit-print-color-adjust: exact; }
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/",
    "react/": "https://aistudiocdn.com/react@^19.2.0/",
    "react": "https://aistudiocdn.com/react@^19.2.0",
    "@google/genai": "https://aistudiocdn.com/@google/genai@^1.30.0"
  }
}
</script>
<script src="/register-sw.js"></script>
</head>
  <body style="margin: 0; padding: 0;" class="bg-gray-50 text-gray-900 transition-colors duration-200 dark:bg-gray-900 dark:text-gray-100 antialiased">
    <div id="root" style="margin: 0; padding: 0; width: 100vw; height: 100vh;"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
