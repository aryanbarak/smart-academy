    <style>
      body {
        font-family: 'Inter', sans-serif;
      }
      
      /* Safe area padding for mobile notches and status bars */
      @supports (padding: env(safe-area-inset-top)) {
        .mobile-header {
          padding-top: env(safe-area-inset-top) !important;
        }
      }
      
      /* Mobile PDF viewer fixes */
      @media (max-width: 768px) {
        /* Make sure main container respects safe areas */
        #root > div {
          padding-top: env(safe-area-inset-top, 0px);
          padding-bottom: env(safe-area-inset-bottom, 0px);
        }
        
        /* Fix horizontal scrolling - make list full width */
        .flex.h-screen {
          overflow-x: hidden !important;
        }
        
        /* Make buttons larger and more tappable */
        button {
          min-height: 48px !important;
          min-width: 48px !important;
          padding: 12px !important;
        }
        
        /* Improve PDF text rendering */
        .textLayer {
          opacity: 1 !important;
          mix-blend-mode: normal !important;
        }
      }
    }
      .font-farsi {
        font-family: 'Vazirmatn', sans-serif;

      /* PDF / Print Optimization */
      @media print {
        @page {
          margin: 2cm;
        }
        body {
          background-color: white !important;
          color: black !important;
        }
        nav, button, .no-print {
          display: none !important;
        }
        #root {
          padding: 0 !important;
          margin: 0 !important;
        }
        .lesson-card-header {
          border: none !important;
          padding: 0 !important;
          margin-bottom: 20px !important;
        }
        .lesson-content {
          display: block !important;
          border: none !important;
          padding: 0 !important;
        }
        pre {
          border: 1px solid #ccc !important;
          background: #f5f5f5 !important;
          color: black !important;
          white-space: pre-wrap !important;
        }
        /* Force background colors for print if user enables it */
        .print:bg-gray-100 { -webkit-print-color-adjust: exact; }
      }
    </style>
